{% load static %}
<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="{% static 'tracker/output.css' %}">        <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
        <title>Dose - {% block title %}{% endblock %}</title>
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
        <script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons())</script>
    </head>
    <body class="min-h-screen bg-background text-foreground">
        <header class="border-b px-6 py-4 text-lg font-semibold">Dose</header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
